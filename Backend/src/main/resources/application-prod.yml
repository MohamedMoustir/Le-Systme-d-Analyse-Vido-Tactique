server:
  port: 8080
  tomcat:
    connection-timeout: 0
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: savt-backend

  boot:
    admin:
      client:
        url: http://localhost:8081
        instance:
          prefer-ip: true


  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB

  thymeleaf:
    cache: false

  mvc:
    async:
      request-timeout: -1

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/savt_db
      auto-index-creation: false

python:
  executable: /root/clean_python/venv/bin/python3
  script:
    path: /root/clean_python/main.py

yolo:
  model:
    path: /root/clean_python/models/yolov8n.pt

teams:
  config:
    path: /root/clean_python/config/teams.json

upload:
  path: /uploads/


logging:
  level:
    root: INFO
    com.football.analyzer: INFO
    com.football.analyzer.application.service.implementation.FootballAnalysisService: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token:
    expiration: 7200000
  refresh-token:
    expiration: 604800000

stripe:
  api:
    key: ${STRIPE_API_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}
  price:
    premium: ${STRIPE_PREMIUM_PRICE_ID}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
