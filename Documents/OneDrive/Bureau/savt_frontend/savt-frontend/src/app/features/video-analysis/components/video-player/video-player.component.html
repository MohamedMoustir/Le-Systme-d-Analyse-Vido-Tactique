<div class="w-full max-w-4xl mx-auto overflow-hidden bg-gray-900 rounded-xl shadow-2xl border border-gray-800">
  <div class="flex border-b border-gray-800 bg-gray-800/50 p-1">
    <button 
      class="flex-1 py-2.5 text-sm font-medium transition-all duration-200 rounded-lg flex items-center justify-center gap-2"
      [ngClass]="activeTab === 'original' 
        ? 'bg-blue-600 text-white shadow-lg' 
        : 'text-gray-400 hover:text-gray-200 hover:bg-gray-700'"
      (click)="showOriginalVideo()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Vidéo Originale
    </button>
    
    <button 
      class="flex-1 py-2.5 text-sm font-medium transition-all duration-200 rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="!isLiveStreamEnabled"
      [ngClass]="activeTab === 'live' 
        ? 'bg-red-600 text-white shadow-lg' 
        : 'text-gray-400 hover:text-gray-200 hover:bg-gray-700'"
      (click)="showLiveStream()">
      <span class="relative flex h-2 w-2" *ngIf="isLiveStreamEnabled">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
      </span>
      Live Stream
    </button>
  </div>

  <div *ngIf="activeTab === 'original'" class="aspect-video bg-black flex items-center justify-center">
    <video 
      #videoPlayer
      class="w-full h-full"
      controls>
      <source [src]="videoUrl" type="video/mp4">
      Votre navigateur ne supporte pas la vidéo.
    </video>
  </div>

  <div *ngIf="activeTab === 'live'" class="relative aspect-video bg-black">
    <img 
      #liveStreamImg
      alt="Live Stream" 
      class="w-full h-full object-contain">
    
    <div *ngIf="showStreamLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity">
      <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-gray-300 font-medium tracking-wide">Chargement du modèle IA...</p>
    </div>
    
    <div class="absolute top-4 right-4 flex items-center gap-2 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider shadow-lg">
      <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span>
      LIVE
    </div>
  </div>
</div>
