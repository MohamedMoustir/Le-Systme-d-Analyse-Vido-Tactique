<div class="min-h-screen bg-slate-950 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black text-slate-200 font-sans flex selection:bg-blue-500/30 overflow-x-hidden">
  
  <app-sidebar #sidebar></app-sidebar>

  <div class="flex-1 flex flex-col min-h-screen relative transition-all duration-300 lg:ml-72 w-full">
    
    <div class="absolute top-0 left-0 w-full h-96 bg-blue-500/5 blur-3xl pointer-events-none"></div>

    <header class="h-20 flex items-center justify-between px-4 md:px-8 sticky top-0 z-40 backdrop-blur-md border-b border-white/5 lg:border-none">
        <div class="flex items-center gap-4">
          <button (click)="sidebar.toggleMenu()" class="lg:hidden p-2 rounded-xl bg-white/5 border border-white/10 text-slate-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>

          <div>
            <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">Vue d'ensemble</h2>
            <p class="text-[10px] md:text-xs text-slate-500">Dernière mise à jour: Aujourd'hui, 14:30</p>
          </div>
        </div>

        <div class="flex gap-4">
          <button class="w-10 h-10 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-slate-400 hover:bg-white/10 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          </button>
        </div>
    </header>

    <main class="flex-1 p-4 md:p-8 overflow-y-auto z-10 w-full">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>

@if (showSuccessToast()) {
  <div class="fixed bottom-6 right-6 z-50 max-w-sm animate-fadein"
       role="alert" aria-live="assertive">
    <div class="flex items-start gap-4 p-4 pr-5 rounded-2xl bg-slate-900 border border-emerald-500/30
                shadow-[0_8px_32px_rgba(0,0,0,0.5),0_0_0_1px_rgba(16,185,129,0.1)]
                backdrop-blur-xl">
      <!-- Icon -->
      <div class="w-10 h-10 rounded-xl bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center shrink-0 mt-0.5">
        <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <!-- Text -->
      <div class="flex-1">
        <p class="text-sm font-bold text-white">Compte mis à niveau ! ⭐</p>
        <p class="text-xs text-slate-400 mt-0.5 leading-relaxed">
          Bienvenue dans <strong class="text-emerald-400">Premium</strong>. Votre stockage illimité est maintenant actif.
        </p>
      </div>
      <!-- Close -->
      <button (click)="showSuccessToast.set(false)"
        class="text-slate-500 hover:text-slate-300 transition-colors mt-0.5 shrink-0">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <!-- Progress bar auto-dismiss -->
    <div class="h-0.5 bg-slate-800 rounded-full mt-1.5 overflow-hidden">
      <div class="h-full bg-emerald-500 rounded-full animate-[shrink_6s_linear_forwards]"></div>
    </div>
  </div>
}

<!-- ─── Payment Cancelled Toast ───────────────────────────────────────── -->
@if (showCancelToast()) {
  <div class="fixed bottom-6 right-6 z-50 max-w-sm animate-fadein"
       role="alert" aria-live="polite">
    <div class="flex items-start gap-4 p-4 pr-5 rounded-2xl bg-slate-900 border border-amber-500/25
                shadow-[0_8px_32px_rgba(0,0,0,0.5)] backdrop-blur-xl">
      <div class="w-10 h-10 rounded-xl bg-amber-500/15 border border-amber-500/20 flex items-center justify-center shrink-0 mt-0.5">
        <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M12 20a8 8 0 100-16 8 8 0 000 16z" />
        </svg>
      </div>
      <div class="flex-1">
        <p class="text-sm font-bold text-white">Paiement annulé</p>
        <p class="text-xs text-slate-400 mt-0.5">Vous pouvez upgrader à tout moment depuis la page Abonnement.</p>
      </div>
      <button (click)="showCancelToast.set(false)"
        class="text-slate-500 hover:text-slate-300 transition-colors mt-0.5 shrink-0">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
}
