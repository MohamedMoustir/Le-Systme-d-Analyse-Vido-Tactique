<div class="min-h-screen flex items-center justify-center bg-[#0f172a] p-4 font-sans">
  
  <div class="bg-[#1e293b] w-full max-w-md rounded-2xl shadow-2xl border border-gray-700/50 p-8">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Bienvenue !</h2>
      <p class="text-gray-400 text-sm">Connectez-vous à votre espace SAVT</p>
    </div>

      <div *ngIf="store.error()" class= "mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center animate-pulse">
        {{ store.error() }}
      </div>
    

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label class="block text-gray-400 text-xs uppercase font-bold mb-2 tracking-wider">Email</label>
        <input type="email" 
               formControlName="email" 
               placeholder="coach@club.com"
               class="w-full px-4 py-3 rounded-xl bg-gray-900/50 text-white border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder-gray-600"
               [class.border-red-500]="f['email'].invalid && f['email'].touched">
        
        @if (f['email'].invalid && f['email'].touched) {
          <div class="text-red-400 text-xs mt-1 ml-1">Email invalide ou requis</div>
        }
      </div>
      
      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-gray-400 text-xs uppercase font-bold tracking-wider">Mot de passe</label>
          <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition">Oublié ?</a>
        </div>
        
        <input type="password" 
               formControlName="password" 
               placeholder="••••••••"
               class="w-full px-4 py-3 rounded-xl bg-gray-900/50 text-white border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder-gray-600"
               [class.border-red-500]="f['password'].invalid && f['password'].touched">
        
        @if (f['password'].invalid && f['password'].touched) {
          <div class="text-red-400 text-xs mt-1 ml-1">Mot de passe requis</div>
        }
      </div>

      <button type="submit" 
              [disabled]="store.isLoading() || loginForm.invalid" 
              class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/30 transform transition hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
        
        @if (store.isLoading() == false) {
          <span>Se connecter</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        } @else {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        }
      </button>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-700"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-3 bg-[#1e293b] text-gray-400">Ou continuer avec</span>
        </div>
      </div>

      

      <p class="mt-6 text-center text-gray-500 text-sm">
        Pas encore de compte ? 
        <a routerLink="/register" class="text-blue-400 hover:text-blue-300 font-semibold cursor-pointer transition hover:underline">S'inscrire</a>
      </p>

    </form>
  </div>
</div>
