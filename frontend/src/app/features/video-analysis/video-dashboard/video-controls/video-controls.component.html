<div class="mt-4 p-4 rounded-2xl bg-slate-900/60 backdrop-blur-xl border border-white/5 flex flex-wrap items-center justify-between gap-4 shadow-lg">
  
  <div class="flex items-center gap-4">
    <div class="relative group">
      <label class="absolute -top-2.5 left-2 bg-slate-900 px-1 text-[10px] uppercase tracking-wider text-blue-400 font-bold z-10">
        Hardware Accel
      </label>
      <select [ngModel]="store.device()"
              (ngModelChange)="updateDevice($event)"
              class="bg-slate-950 border border-white/10 text-slate-300 text-sm rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 block w-48 p-2.5 outline-none cursor-pointer transition-all hover:border-blue-500/30 appearance-none">
        <option value="cpu">CPU (Standard)</option>
        <option value="cuda">GPU (NVIDIA CUDA)</option>
      </select>
      <div class="absolute right-3 top-3 pointer-events-none text-slate-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-3">
    
    <button (click)="onStartAnalysis()"
            [disabled]="store.isAnalyzing() || !store.currentVideoId()"
            class="group relative px-6 py-2.5 rounded-xl font-bold text-sm text-white overflow-hidden transition-all disabled:opacity-50 disabled:cursor-not-allowed">
      <div class="absolute inset-0 bg-linear-to-r from-blue-600 to-cyan-500 transition-all group-hover:scale-105"></div>
      <div class="absolute inset-0 opacity-0 group-hover:opacity-100 bg-blue-400 blur-xl transition-all duration-300"></div>
      
      <span class="relative z-10 flex items-center gap-2">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        LANCER L'ANALYSE
      </span>
    </button>

    <button (click)="onStopAnalysis()"
            [disabled]="!store.isAnalyzing()"
            class="group px-6 py-2.5 rounded-xl font-bold text-sm text-red-500 border border-red-500/20 hover:bg-red-500/10 hover:border-red-500/50 hover:shadow-[0_0_15px_rgba(239,68,68,0.2)] transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
      STOP
    </button>

  </div>
</div>
