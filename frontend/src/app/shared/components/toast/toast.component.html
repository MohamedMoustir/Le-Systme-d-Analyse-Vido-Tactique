<div class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 w-80 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="toast-slide-in pointer-events-auto flex items-start gap-3 rounded-xl px-4 py-3
             bg-slate-900/80 backdrop-blur-xl border border-white/10 shadow-2xl"
      [class.border-l-green-500]="toast.type === 'success'"
      [class.border-l-red-500]="toast.type === 'error'"
      [class.border-l-blue-400]="toast.type === 'info'"
      style="border-left-width: 3px;"
    >
      <!-- Icon -->
      <div class="mt-0.5 shrink-0">
        @if (toast.type === 'success') {
          <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        }
        @if (toast.type === 'error') {
          <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
        @if (toast.type === 'info') {
          <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 110 20A10 10 0 0112 2z" />
          </svg>
        }
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        @if (toast.title) {
          <p class="text-sm font-semibold text-slate-100 leading-tight">{{ toast.title }}</p>
        }
        <p class="text-sm text-slate-300 leading-snug">{{ toast.message }}</p>
      </div>

      <!-- Close button -->
      <button
        (click)="toastService.dismiss(toast.id)"
        class="shrink-0 text-slate-500 hover:text-slate-200 transition-colors"
        aria-label="Fermer"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
