<div class="bg-slate-900/90 border border-white/10 rounded-2xl p-6 shadow-2xl backdrop-blur-xl max-w-md w-full">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-white flex items-center gap-2">📝 Créer un utilisateur</h2>
    <button (click)="onCancel()" class="text-slate-400 hover:text-white">✖</button>
  </div>

  @if (errorMessage) {
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm">{{ errorMessage }}</div>
  }

  <form [formGroup]="createForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nom complet</label>
      <input type="text" formControlName="nom" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-white" placeholder="Ex: Pep Guardiola">
    </div>
    <div>
      <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Email</label>
      <input type="email" formControlName="email" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-white" placeholder="coach@equipe.com">
    </div>
    <div>
      <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Mot de passe</label>
      <input type="password" formControlName="password" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-white" placeholder="••••••••">
    </div>
    <div>
      <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Rôle</label>
      <select formControlName="role" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-white">
        <option value="COACH">Entraîneur (Coach)</option>
        <option value="ADMIN">Administrateur (Admin)</option>
      </select>
    </div>
    <div class="pt-4 flex gap-3">
      <button type="button" (click)="onCancel()" class="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl">Annuler</button>
      <button type="submit" [disabled]="createForm.invalid || isSubmitting" class="flex-1 px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl disabled:opacity-50">
        @if (isSubmitting) { <span class="animate-spin text-xl">⏳</span> } @else { Enregistrer }
      </button>
    </div>
  </form>
</div>
