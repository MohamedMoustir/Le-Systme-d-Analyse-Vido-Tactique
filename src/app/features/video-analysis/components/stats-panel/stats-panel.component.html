<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

  <div class="relative group overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 backdrop-blur-xl shadow-2xl transition-all hover:-translate-y-1 hover:border-blue-500/50">
    <div class="absolute -top-10 -right-10 w-24 h-24 bg-blue-500/20 rounded-full blur-2xl group-hover:bg-blue-500/40 transition-all"></div>
    
    <div class="p-5 relative z-10">
      <div class="flex justify-between items-start mb-4">
        <div class="stat-icon-box p-2.5 rounded-lg bg-blue-500/10 text-blue-400 border border-blue-500/20 flex items-center justify-center w-10 h-10">
          <i class="fa-solid fa-users text-base"></i>
        </div>
        <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">Joueurs</span>
      </div>
      <div class="flex items-baseline gap-1">
        <h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
          {{ playersCount() }}
        </h3>
        <span class="text-xs text-slate-400">sur le terrain</span>
      </div>
    </div>
  </div>

  <div class="relative group overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 backdrop-blur-xl shadow-2xl transition-all hover:-translate-y-1 hover:border-emerald-500/50">
    <div class="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/20 rounded-full blur-2xl group-hover:bg-emerald-500/40 transition-all"></div>
    
    <div class="p-5 relative z-10">
      <div class="flex justify-between items-start mb-4">
        <div class="stat-icon-box p-2.5 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 flex items-center justify-center w-10 h-10">
          <i class="fa-regular fa-futbol text-base"></i>
        </div>
        <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">Ballon</span>
      </div>
      <div>
        <h3 class="text-xl font-bold transition-colors duration-300" 
            [ngClass]="ballStatus().isDetected ? 'text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]' : 'text-slate-500'">
          {{ ballStatus().text }}
        </h3>
      </div>
    </div>
  </div>

  <div class="relative group overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 backdrop-blur-xl shadow-2xl transition-all hover:-translate-y-1 hover:border-violet-500/50">
    <div class="absolute -top-10 -right-10 w-24 h-24 bg-violet-500/20 rounded-full blur-2xl group-hover:bg-violet-500/40 transition-all"></div>
    
    <div class="p-5 relative z-10">
      <div class="flex justify-between items-start mb-4">
        <div class="stat-icon-box p-2.5 rounded-lg bg-violet-500/10 text-violet-400 border border-violet-500/20 flex items-center justify-center w-10 h-10">
          <i class="fa-solid fa-bolt text-base"></i>
        </div>
        <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">Max Speed</span>
      </div>
      <div class="flex items-baseline gap-1">
        <h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-300">
          {{ topStats().maxSpeed }}
        </h3>
      </div>
    </div>
  </div>

  <div class="relative group overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 backdrop-blur-xl shadow-2xl transition-all hover:-translate-y-1 hover:border-amber-500/50">
    <div class="absolute -top-10 -right-10 w-24 h-24 bg-amber-500/20 rounded-full blur-2xl group-hover:bg-amber-500/40 transition-all"></div>
    
    <div class="p-5 relative z-10">
      <div class="flex justify-between items-start mb-4">
        <div class="stat-icon-box p-2.5 rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/20 flex items-center justify-center w-10 h-10">
          <i class="fa-solid fa-route text-base"></i>
        </div>
        <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">Distance</span>
      </div>
      <div class="flex items-baseline gap-1">
        <h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-300">
          {{ topStats().maxDistance }}
        </h3>
      </div>
    </div>
  </div>

</div>
