<div class="relative space-y-8 pl-4 py-2">

  <div
    class="absolute left-[23px] top-0 bottom-0 w-[2px] bg-gradient-to-b from-blue-500 via-violet-500 to-transparent opacity-30">
  </div>

  @for (event of events(); track $index) {
  <div class="relative pl-8 group">

    <div
      class="absolute left-0 top-1 w-[14px] h-[14px] rounded-full border-2 border-slate-900 shadow-[0_0_10px_currentColor] z-10 transition-all group-hover:scale-125"
      [ngClass]="{
  'bg-emerald-500 shadow-[0_0_10px_#10b981] text-emerald-500': event.type === 'goal',
  'bg-amber-500 shadow-[0_0_10px_#f59e0b] text-amber-500': event.type.includes('card'),
  'bg-blue-500 shadow-[0_0_10px_#3b82f6] text-blue-500': event.type === 'whistle',
  'bg-violet-500 shadow-[0_0_10px_#8b5cf6] text-violet-500': event.type === 'info' }"></div>

    <div
      class="bg-slate-800/40 backdrop-blur-sm border border-white/5 rounded-r-xl rounded-bl-xl p-4 hover:bg-slate-800/60 hover:border-white/10 transition-all cursor-default">
      <div class="flex justify-between items-center mb-1">
        <span
          class="font-mono text-xs font-bold px-2 py-0.5 rounded bg-slate-950/50 text-slate-300 border border-white/5">
          {{ event.time }}'
        </span>
        <span class="text-[10px] tracking-wider uppercase text-slate-500 font-bold">
          {{ event.team === 'A' ? 'Domicile' : (event.team === 'B' ? 'Extérieur' : 'System') }}
        </span>
      </div>

      <p class="text-sm font-medium text-slate-200">
        {{ event.description }}
      </p>
    </div>

  </div>
  }

  @if (events().length === 0) {
  <div class="flex flex-col items-center justify-center py-10 opacity-40">
    <svg class="w-8 h-8 text-slate-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span class="text-xs font-mono text-slate-500">En attente d'événements...</span>
  </div>
  }
</div>
