<div 
  class="relative flex flex-col items-center justify-center w-full h-64 border-2 border-dashed rounded-xl cursor-pointer transition-all duration-300 ease-in-out"
  [ngClass]="isDragover ? 'border-blue-500 bg-blue-50 scale-[1.01]' : 'border-gray-300 bg-gray-50 hover:bg-gray-100 hover:border-gray-400'"
  (click)="fileInput.click()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)">
  
  <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
    <svg 
      class="w-12 h-12 mb-4 transition-colors duration-300" 
      [class.text-blue-500]="isDragover"
      [class.text-gray-500]="!isDragover"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>

    <p class="mb-2 text-sm font-semibold text-gray-700">
      <span class="text-blue-600 underline">Glissez une vidéo ici</span> ou cliquez pour sélectionner
    </p>
    <p class="text-xs text-gray-500">Formats acceptés: MP4, AVI, MOV (Max. 500MB)</p>
  </div>

  <input 
    type="file" 
    #fileInput
    accept="video/*" 
    class="hidden" 
    (change)="onFileSelected($event)">
</div>
