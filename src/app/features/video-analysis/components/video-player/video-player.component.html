<div class="relative w-full overflow-hidden rounded-2xl bg-slate-900/80 backdrop-blur-md border border-white/10 shadow-2xl ring-1 ring-white/5 group">
  
  <div class="absolute top-4 left-1/2 -translate-x-1/2 z-20 flex p-1 bg-black/60 backdrop-blur-xl rounded-full border border-white/10 shadow-lg">
    
    <button (click)="showOriginalVideo()"
            class="relative px-6 py-2 text-xs font-bold uppercase tracking-wider rounded-full transition-all duration-300 overflow-hidden"
            [ngClass]="activeTab() === 'original' ? 'text-white' : 'text-slate-400 hover:text-white'">
      @if (activeTab() === 'original') {
        <div class="absolute inset-0 bg-blue-600/80 shadow-[0_0_15px_rgba(37,99,235,0.5)]"></div>
      }
      <span class="relative z-10 flex items-center gap-2">
        <i class="fa-solid fa-play text-xs"></i>
        Original
      </span>
    </button>

    <button (click)="showLiveStream()"
            [disabled]="!store.isAnalyzing()"
            class="relative px-6 py-2 text-xs font-bold uppercase tracking-wider rounded-full transition-all duration-300 overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed"
            [ngClass]="activeTab() === 'live' ? 'text-white' : 'text-slate-400 hover:text-white'">
      @if (activeTab() === 'live') {
        <div class="absolute inset-0 bg-red-600/80 shadow-[0_0_15px_rgba(220,38,38,0.5)]"></div>
      }
      <span class="relative z-10 flex items-center gap-2">
        @if (store.isAnalyzing()) {
          <span class="flex h-2 w-2 relative">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
          </span>
        }
        Live Analysis
      </span>
    </button>
  </div>

  <div class="aspect-video bg-black relative flex items-center justify-center overflow-hidden">
    
    <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
    <div class="absolute inset-0 bg-radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.6)_100%) pointer-events-none"></div>

    @if (activeTab() === 'original') {
      @if (store.originalVideoUrl()) {
        <video class="w-full h-full object-contain relative z-10" 
           [src]="src" 
           controls 
           crossorigin="anonymous">
    </video>
      } @else {
        <div class="text-center space-y-2 relative z-10">
          <div class="w-16 h-16 mx-auto rounded-full bg-slate-800/50 flex items-center justify-center border border-white/10">
            <i class="fa-solid fa-video text-2xl text-slate-500"></i>
          </div>
          <p class="text-slate-500 font-mono text-sm">En attente de signal vidéo...</p>
        </div>
      }
    }

    @if (activeTab() === 'live') {
      <div class="relative w-full h-full z-10">
        @if (safeStreamUrl()) {
          <img [src]="safeStreamUrl()" (load)="onStreamLoaded()" class="w-full h-full object-contain">
        }

        @if (isStreamImageLoading()) {
          <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm">
            <div class="relative">
              <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-8 h-8 bg-blue-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
              </div>
            </div>
            <p class="mt-6 text-blue-400 font-mono text-sm tracking-[0.2em] animate-pulse">INITIALISATION IA...</p>
          </div>
        }

        <div class="absolute top-6 right-6 flex items-center gap-2 px-3 py-1 bg-red-600/20 border border-red-500/50 backdrop-blur-md rounded text-red-500 text-[10px] font-bold uppercase tracking-widest shadow-[0_0_15px_rgba(220,38,38,0.2)]">
          <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_currentColor]"></span>
          LIVE FEED
        </div>
      </div>
    }
  </div>
</div>
