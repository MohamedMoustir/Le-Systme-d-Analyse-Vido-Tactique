<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-[#070b14]/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>
    
    <div class="relative w-full max-w-md bg-[#0b1120] border border-white/10 rounded-3xl overflow-hidden shadow-2xl">
        
        <div class="px-6 py-5 border-b border-white/5 bg-[#111827]/50 flex justify-between items-center">
            <h3 class="text-lg font-bold text-white">{{ isEditMode ? 'Modifier le Joueur' : 'Nouveau Joueur' }}</h3>
            <button (click)="onClose()" class="text-slate-500 hover:text-white transition-colors p-1">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="p-6 space-y-5">
            
            <div class="flex flex-col items-center justify-center mb-2">
                <div (click)="onPhotoClick()" 
                     class="w-28 h-28 rounded-2xl border-2 border-dashed border-white/10 flex items-center justify-center cursor-pointer overflow-hidden hover:border-blue-500/50 hover:bg-[#111827] transition-all bg-[#111827]/50 group relative shadow-inner">
                    
                    @if (photoPreview) {
                        <img [src]="photoPreview" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </div>
                    } @else {
                        <div class="flex flex-col items-center text-slate-500 group-hover:text-blue-400 transition-colors">
                            <svg class="w-8 h-8 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span class="text-[9px] font-bold uppercase tracking-wider">Ajouter Photo</span>
                        </div>
                    }
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Nom Complet</label>
                <input type="text" formControlName="nomComplet" placeholder="Ex: Yassine Bounou"
                       class="w-full bg-[#111827] border border-white/10 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600 shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Numéro</label>
                    <input type="number" formControlName="numeroMaillot" placeholder="Ex: 1"
                           class="w-full bg-[#111827] border border-white/10 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600 shadow-inner">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Poste</label>
                    <select formControlName="poste" 
                            class="w-full bg-[#111827] border border-white/10 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all appearance-none shadow-inner cursor-pointer">
                        <option value="" disabled selected>Choisir...</option>
                        <option value="Gardien">Gardien</option>
                        <option value="Défenseur">Défenseur</option>
                        <option value="Milieu">Milieu</option>
                        <option value="Attaquant">Attaquant</option>
                    </select>
                </div>
            </div>

            <button type="submit" [disabled]="formGroup.invalid" 
                    class="w-full mt-4 py-3.5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed rounded-xl text-white text-xs font-bold uppercase tracking-widest transition-all shadow-lg flex justify-center items-center gap-2">
                {{ isEditMode ? 'Mettre à jour' : 'Enregistrer le joueur' }}
            </button>
        </form>
    </div>
</div>
