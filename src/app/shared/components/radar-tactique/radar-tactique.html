<p class="text-xs text-slate-400 mb-2 font-mono flex items-center justify-between">
    <span>Radar Tactique (Live Match View)</span>
    <span class="px-2 py-0.5 bg-green-500/20 text-green-400 rounded-full text-[10px] animate-pulse">● LIVE</span>
</p>

<div class="rounded-2xl bg-[#111] p-4 shadow-2xl relative border border-white/5">
    
    <div class="relative w-full aspect-[105/68] bg-[#124b23] border border-white/40 overflow-hidden shadow-[inset_0_0_60px_rgba(0,0,0,0.5)]">
        
        <div class="absolute top-0 bottom-0 left-1/2 w-[1.5px] bg-white/30 -translate-x-1/2"></div>
        <div class="absolute top-1/2 left-1/2 w-[15%] aspect-square rounded-full border-[1.5px] border-white/30 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute top-1/2 left-0 w-[16%] h-[60%] border-[1.5px] border-white/30 border-l-0 -translate-y-1/2"></div>
        <div class="absolute top-1/2 right-0 w-[16%] h-[60%] border-[1.5px] border-white/30 border-r-0 -translate-y-1/2"></div>
        <div class="absolute top-1/2 left-0 w-[5%] h-[25%] border-[1.5px] border-white/30 border-l-0 -translate-y-1/2"></div>
        <div class="absolute top-1/2 right-0 w-[5%] h-[25%] border-[1.5px] border-white/30 border-r-0 -translate-y-1/2"></div>

        @for (player of players(); track player.id) {
            <div class="absolute w-1 h-1 -translate-x-1/2 -translate-y-1/2 mix-blend-screen pointer-events-none transition-all duration-300 ease-linear"
                 [ngClass]="{
                    'shadow-[0_0_50px_35px_rgba(239,68,68,0.5)]': player.team === 'HOME',
                    'shadow-[0_0_50px_35px_rgba(59,130,246,0.5)]': player.team === 'AWAY'
                 }"
                 [style.left.%]="player.FieldX" 
                 [style.top.%]="player.FieldY">
            </div>
        }

        @for (player of players(); track player.id) {
            <div class="absolute w-5 h-5 rounded-full border border-white/80 -translate-x-1/2 -translate-y-1/2 z-20 transition-all duration-300 ease-linear flex items-center justify-center text-[9px] font-bold text-white cursor-pointer group hover:scale-125 hover:z-30 shadow-[0_4px_10px_rgba(0,0,0,0.5)]"
                 [ngClass]="{
                    'bg-red-600': player.team === 'HOME',
                    'bg-blue-600': player.team === 'AWAY'
                 }"
                 [style.left.%]="player.FieldX" 
                 [style.top.%]="player.FieldY">
                 
                 {{ player.number }}

                 <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 bg-slate-900/90 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm whitespace-nowrap border border-slate-700 pointer-events-none flex flex-col items-center gap-0.5 shadow-xl">
                     <span class="text-slate-400 font-normal">Joueur #{{player.id}}</span>
                     <span class="font-mono text-cyan-400">{{ player.speed }} km/h</span>
                     
                     <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-700"></div>
                 </div>
                 
                 @if (player.hasBall) {
                     <div class="absolute -bottom-1 -right-1 w-2.5 h-2.5 bg-yellow-400 rounded-full border-[1.5px] border-black shadow-[0_0_8px_yellow] animate-bounce"></div>
                 }
            </div>
        }
    </div>
</div>
