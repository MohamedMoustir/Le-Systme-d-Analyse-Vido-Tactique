server:
  port: 8080
  tomcat:
    connection-timeout: 0
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: savt-backend

  boot:
    admin:
      client:
        url: http://localhost:8081
        instance:
          prefer-ip: true

  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB

  thymeleaf:
    cache: false

  mvc:
    async:
      request-timeout: -1

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/savt_db
      auto-index-creation: false


python:
  executable: /root/clean_python/venv/bin/python3
  script:
    path: /root/clean_python/main.py

yolo:
  model:
    path: /root/clean_python/models/yolov8m_soccer.pt

teams:
  config:
    path: /root/clean_python/config/teams.json

upload:
  path: /root/backend-deploy/uploads

logging:
  level:
    root: INFO
    com.football.analyzer: INFO
    com.football.analyzer.application.service.implementation.FootballAnalysisService: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token:
    expiration: 7200000
  refresh-token:
    expiration: 604800000

